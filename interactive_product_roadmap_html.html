<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Product Roadmap</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 30px;
    }

    .search-box {
      margin-bottom: 30px;
    }

    input {
      padding: 10px;
      width: 300px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
    }

    .quarter {
      background: white;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    .quarter-header {
      padding: 20px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .quarter-header:hover {
      background: #f9fafb;
    }

    .theme {
      font-size: 14px;
      color: #6b7280;
    }

    .initiatives {
      display: none;
      padding: 20px;
      border-top: 1px solid #e5e7eb;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .initiative {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 15px;
      background: #ffffff;
    }

    .initiative h3 {
      margin-top: 0;
      font-size: 16px;
    }

    .meta {
      font-size: 13px;
      color: #4b5563;
      margin: 4px 0;
    }

    .status {
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      display: inline-block;
      margin-top: 5px;
    }

    .Planned { background: #e0f2fe; color: #0369a1; }
    ."In Progress" { background: #fef9c3; color: #92400e; }
    .Completed { background: #dcfce7; color: #166534; }
    .Discovery { background: #ede9fe; color: #5b21b6; }

  </style>
</head>
<body>
  <div class="container">
    <h1>Product Roadmap Overview</h1>
    <div class="subtitle">Strategic direction, priorities, and measurable outcomes</div>

    <div class="search-box">
      <input type="text" id="search" placeholder="Search initiative..." />
    </div>

    <div id="roadmap"></div>
  </div>

  <script>
    // ==============================
    // 🔧 CUSTOMIZE YOUR ROADMAP DATA HERE
    // ==============================
    const roadmapData = [
      {
        quarter: "Q1 2026",
        theme: "Foundation & Stability",
        initiatives: [
          {
            title: "Platform Performance Optimization",
            owner: "Engineering",
            status: "In Progress",
            impact: "Reduce API latency by 30%",
            metric: "P95 < 200ms",
          },
          {
            title: "User Onboarding Revamp",
            owner: "Product",
            status: "Planned",
            impact: "Increase activation rate",
            metric: "+15% activation",
          },
        ],
      },
      {
        quarter: "Q2 2026",
        theme: "Growth & Expansion",
        initiatives: [
          {
            title: "New Market Launch",
            owner: "Business",
            status: "Planned",
            impact: "Expand to 2 new cities",
            metric: "10K new users",
          },
          {
            title: "AI Recommendation Engine",
            owner: "Data Team",
            status: "Discovery",
            impact: "Improve engagement",
            metric: "+20% retention",
          },
        ],
      },
    ];

    const roadmapContainer = document.getElementById("roadmap");
    const searchInput = document.getElementById("search");

    function renderRoadmap(filter = "") {
      roadmapContainer.innerHTML = "";

      roadmapData.forEach((quarterData, index) => {
        const filteredInitiatives = quarterData.initiatives.filter(i =>
          i.title.toLowerCase().includes(filter.toLowerCase())
        );

        if (filteredInitiatives.length === 0) return;

        const quarterDiv = document.createElement("div");
        quarterDiv.className = "quarter";

        const header = document.createElement("div");
        header.className = "quarter-header";
        header.innerHTML = `
          <div>
            <strong>${quarterData.quarter}</strong>
            <div class="theme">Theme: ${quarterData.theme}</div>
          </div>
          <div>▼</div>
        `;

        const initiativesDiv = document.createElement("div");
        initiativesDiv.className = "initiatives";

        filteredInitiatives.forEach(initiative => {
          const card = document.createElement("div");
          card.className = "initiative";
          card.innerHTML = `
            <h3>${initiative.title}</h3>
            <div class="meta"><strong>Owner:</strong> ${initiative.owner}</div>
            <div class="meta"><strong>Impact:</strong> ${initiative.impact}</div>
            <div class="meta"><strong>Metric:</strong> ${initiative.metric}</div>
            <div class="status ${initiative.status}">${initiative.status}</div>
          `;
          initiativesDiv.appendChild(card);
        });

        header.addEventListener("click", () => {
          initiativesDiv.style.display =
            initiativesDiv.style.display === "grid" ? "none" : "grid";
        });

        quarterDiv.appendChild(header);
        quarterDiv.appendChild(initiativesDiv);
        roadmapContainer.appendChild(quarterDiv);
      });
    }

    searchInput.addEventListener("input", e => {
      renderRoadmap(e.target.value);
    });

    renderRoadmap();
  </script>
</body>
</html>
